name: Benchmark Pages

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: benchmark-pages
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    runs-on: ubuntu-latest
    env:
      PUBLIC_DATA_BASE_URL: ${{ vars.PUBLIC_DATA_BASE_URL }}
      R2_ACCOUNT_ID: ${{ vars.R2_ACCOUNT_ID }}
      R2_BUCKET: ${{ vars.R2_BUCKET }}
      R2_PREFIX: ${{ vars.R2_PREFIX }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore SQLite history
        uses: actions/cache@v4
        with:
          path: data/benchmark.sqlite
          key: benchmark-sqlite-${{ github.run_id }}
          restore-keys: |
            benchmark-sqlite-

      - name: Verify
        run: |
          npm test
          npm run typecheck

      - name: Collect once and export
        run: |
          npm run run:benchmark -- --once
          npm run summary
          npm run export -- --data-base-url "${PUBLIC_DATA_BASE_URL}"

      - name: Publish data to R2
        run: |
          if [ -n "${R2_ACCOUNT_ID}" ] && [ -n "${R2_BUCKET}" ] && [ -n "${R2_ACCESS_KEY_ID}" ] && [ -n "${R2_SECRET_ACCESS_KEY}" ]; then
            npm run publish:r2
          else
            echo "Skipping R2 publish because R2 vars/secrets are not fully configured."
          fi

      - name: Send Telegram anomalies
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: npm run telegram:send-anomalies

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
